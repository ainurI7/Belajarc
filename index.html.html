<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Aspirasi Siswa</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

header {
  background: #4CAF50;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  width: 90%;
  max-width: 800px;
  margin: 20px auto;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 10px 0 10px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.like-btn {
  background: #2196F3;
}

.link {
  color: blue;
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card">
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p>Belum punya akun? <span class="link" onclick="showRegister()">Daftar</span></p>
  </div>
</div>

<!-- REGISTER -->
<div id="registerPage" class="container hidden">
  <div class="card">
    <h2>Daftar</h2>
    <input type="text" id="regUser" placeholder="Username">
    <input type="password" id="regPass" placeholder="Password">
    <button onclick="register()">Daftar</button>
    <p>Sudah punya akun? <span class="link" onclick="showLogin()">Login</span></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="mainPage" class="hidden">

<header>
  <h1>Aspirasi Siswa</h1>
  <p id="welcome"></p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="card">
    <h3>Kirim Aspirasi</h3>
    <textarea id="aspirasi" placeholder="Tulis aspirasi..."></textarea>
    <button onclick="tambahAspirasi()">Kirim</button>
  </div>

  <div id="listAspirasi"></div>

</div>
</div>

<script>
// ===== DATA =====
let users = JSON.parse(localStorage.getItem("users")) || [];
let aspirasi = JSON.parse(localStorage.getItem("aspirasi")) || [];
let currentUser = localStorage.getItem("currentUser");

// ===== INIT =====
if (currentUser) {
  showMain();
}

// ===== NAVIGATION =====
function showRegister() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("registerPage").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("registerPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

function showMain() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("registerPage").classList.add("hidden");
  document.getElementById("mainPage").classList.remove("hidden");

  document.getElementById("welcome").innerText = "Halo, " + currentUser;
  tampilkanAspirasi();
}

// ===== REGISTER =====
function register() {
  let u = document.getElementById("regUser").value;
  let p = document.getElementById("regPass").value;

  if (!u || !p) return alert("Isi semua!");

  users.push({username: u, password: p});
  localStorage.setItem("users", JSON.stringify(users));

  alert("Berhasil daftar!");
  showLogin();
}

// ===== LOGIN =====
function login() {
  let u = document.getElementById("loginUser").value;
  let p = document.getElementById("loginPass").value;

  let user = users.find(x => x.username === u && x.password === p);

  if (user) {
    localStorage.setItem("currentUser", u);
    currentUser = u;
    showMain();
  } else {
    alert("Login gagal!");
  }
}

// ===== LOGOUT =====
function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

// ===== TAMBAH ASPIRASI =====
function tambahAspirasi() {
  let isi = document.getElementById("aspirasi").value;

  if (!isi) return alert("Tidak boleh kosong!");

  aspirasi.push({
    user: currentUser,
    isi: isi,
    like: 0
  });

  localStorage.setItem("aspirasi", JSON.stringify(aspirasi));
  document.getElementById("aspirasi").value = "";
  tampilkanAspirasi();
}

// ===== TAMPILKAN =====
function tampilkanAspirasi() {
  let html = "";

  aspirasi.slice().reverse().forEach((a, i) => {
    html += `
      <div class="card">
        <strong>${a.user}</strong>
        <p>${a.isi}</p>
        <button class="like-btn" onclick="like(${aspirasi.length - 1 - i})">
          👍 Like (${a.like})
        </button>
      </div>
    `;
  });

  document.getElementById("listAspirasi").innerHTML = html;
}

// ===== LIKE =====
function like(i) {
  aspirasi[i].like++;
  localStorage.setItem("aspirasi", JSON.stringify(aspirasi));
  tampilkanAspirasi();
}
</script>

</body>
</html>
